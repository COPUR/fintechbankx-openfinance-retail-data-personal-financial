name: Required Gates

on:
  pull_request:
  push:
    branches:
      - main
      - dev
      - staging

permissions:
  contents: read
  pull-requests: read

jobs:
  build:
    name: ci/build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Java 23
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '23'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '9.3.1'
      - name: Build
        run: gradle clean assemble --no-daemon

  test:
    name: ci/test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Java 23
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '23'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '9.3.1'
      - name: Test + Coverage Gate
        run: gradle test jacocoTestReport jacocoTestCoverageVerification --no-daemon

  security:
    name: ci/security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: OpenAPI lint
        if: ${{ hashFiles('api/openapi/*.yaml') != '' }}
        run: NPM_CONFIG_CACHE=/tmp/.npm npx -y @redocly/cli@1.27.1 lint api/openapi/*.yaml
      - name: Install gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Gitleaks scan
        run: gitleaks detect --source . --no-banner --redact
